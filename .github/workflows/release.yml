name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: dyalog/dyalog:20.0
      options: --user root

    steps:
      - name: Install Dependencies
        run: |
          apt-get update && apt-get install -y git nodejs zip unzip

      - uses: actions/checkout@v4

      - name: Activate Tatin and Cider
        run: dyalogscript .github/activate.apls

      - name: Build package
        run: dyalogscript Build.apls

      - name: Publish to Tatin
        run: |
          cd Dist
          dyalogscript ../.github/release.apls
        env:
          TATIN_API_KEY: ${{ secrets.TATIN_API_KEY }}

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: Dist/bkaw-Stark-*.zip

  deploy-docs:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
